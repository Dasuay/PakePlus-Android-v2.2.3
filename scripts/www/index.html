<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>小说人设·关系簿</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.33.2/dist/cytoscape.min.js"></script>
    <style>
        /* ---------- 基础与变量 ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f7f4f0; --card-bg: #ffffff; --primary: #b76e79; --primary-dark: #9a5a64;
            --primary-light: #e8d5d8; --text: #2e2a28; --text-light: #6b5f5c; --border: #ddd6d0;
            --shadow: 0 8px 24px rgba(0,0,0,0.06); --radius: 16px; --radius-sm: 10px; --transition: 0.25s ease;
        }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); padding: 24px; 
            min-height: 100vh; overflow: hidden; line-height: 1.6; 
        }
        .app-container { max-width: 1400px; width: 100%; height: calc(100vh - 48px); margin: 0 auto; display: flex; flex-direction: column; }
        .app-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--primary-light); }
        .app-header h1 { font-size: 2rem; font-weight: 600; color: var(--primary-dark); display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 12px; flex-wrap: wrap; }
        
        /* ---------- 按钮 ---------- */
        .btn { padding: 8px 16px; border: none; border-radius: var(--radius-sm); font-weight: 500; font-size: 0.95rem; cursor: pointer; transition: all var(--transition); display: inline-flex; align-items: center; gap: 6px; background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
        .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(183, 110, 121, 0.2); }
        .btn-outline { background: transparent; border: 1px solid var(--border); }
        .btn-outline:hover { background: var(--primary-light); border-color: var(--primary); }
        .btn-danger { background: #e74c3c; color: #fff; border-color: #e74c3c; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }
        
        /* ---------- 布局与面板 ---------- */
        .main-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; flex: 1; min-height: 0; }
        .panel { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .panel-header h2 { font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--primary-dark); }
        .relation-graph-container { flex: 1; overflow: hidden; position: relative; }
        #cy { width: 100%; height: 100%; border-radius: var(--radius-sm); background: #fcfaf8; outline: none; }
        
        /* ---------- 搜索框 ---------- */
        .search-box { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: #faf8f6; flex-shrink: 0; }
        .search-box i { color: var(--text-light); }
        .search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 0.95rem; color: var(--text); }
        
        /* ---------- 列表与分类手风琴 ---------- */
        .list-container { flex: 1; overflow-y: auto; padding: 16px; }
        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-track { background: var(--bg); border-radius: 10px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 10px; }
        
        .category-group { margin-bottom: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #fff; overflow: hidden; transition: all 0.3s; }
        .category-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #faf8f6; cursor: pointer; font-weight: 600; font-size: 1.05rem; user-select: none; border: 2px solid transparent; border-radius: var(--radius-sm); }
        .category-header i.fa-chevron-down { transition: transform 0.3s ease; color: var(--text-light); font-size: 0.9rem; }
        .category-group.collapsed .category-header i.fa-chevron-down { transform: rotate(-90deg); }
        .category-content { padding: 8px; min-height: 40px; transition: all 0.3s ease; }
        .category-group.collapsed .category-content { display: none; }

        .cat-color-picker { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; padding: 0; border: none; border-radius: 50%; cursor: pointer; outline: none; background: transparent; }
        .cat-color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .cat-color-picker::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 50%; }
        .cat-color-picker::-moz-color-swatch { border: 1px solid var(--border); border-radius: 50%; }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-radius: var(--radius-sm); background: #fcfaf8; margin-bottom: 8px; border-left: 4px solid var(--primary-light); transition: all 0.2s ease; cursor: pointer; user-select: none; -webkit-user-select: none; }
        .list-item:last-child { margin-bottom: 0; }
        .list-item:hover { background: #f6f0ec; transform: translateX(2px); box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .list-item .info { flex: 1; min-width: 0; }
        .list-item .info .name { font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .list-item .info .name .badge { font-weight: 400; font-size: 0.75rem; background: var(--primary-light); color: var(--primary-dark); padding: 2px 8px; border-radius: 12px; }
        .list-item .info .detail { font-size: 0.85rem; color: var(--text-light); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }
        
        .empty-msg { color: var(--text-light); text-align: center; padding: 20px 0; font-size: 0.9rem; font-style: italic; }
        
        /* 移动角色状态 */
        body.is-moving .category-header { background: #fff4f5; border: 2px dashed var(--primary); cursor: crosshair; }
        body.is-moving .category-header:hover { background: var(--primary-light); }
        body.is-moving .list-item { opacity: 0.5; pointer-events: none; } 
        
        /* 悬浮提示框 (底部) */
        #moveToast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--primary-dark); color: #fff; padding: 12px 36px; border-radius: 30px; z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,0.2); font-size: 1.05rem; font-weight: bold; cursor: pointer; user-select: none; text-align: center; transition: background 0.2s; }
        #moveToast:active { background: var(--primary); }

        /* ---------- 模态框与详情 ---------- */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(2px); }
        .modal { background: var(--card-bg); border-radius: var(--radius); box-shadow: 0 24px 48px rgba(0,0,0,0.15); max-width: 800px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; }
        .modal-header { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1.4rem; font-weight: 600; color: var(--primary-dark); }
        .modal-body { padding: 28px; overflow-y: auto; flex: 1; scroll-behavior: smooth; }
        .modal-footer { padding: 16px 28px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; background: #faf8f6; border-radius: 0 0 var(--radius) var(--radius); }
        
        .detail-section { margin-bottom: 28px; }
        .detail-section h4 { font-size: 1.15rem; margin-bottom: 14px; color: var(--primary-dark); display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .detail-content { background: #fcfaf8; padding: 18px 20px; border-radius: var(--radius-sm); border: 1px solid var(--border); min-height: 44px; word-break: break-word; white-space: pre-wrap; }
        .detail-content.empty { color: var(--text-light); font-style: italic; }
        
        .edit-input, .edit-textarea, .edit-select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.95rem; background: #fff; font-family: inherit; color: var(--text); line-height: 1.5; }
        .edit-textarea { min-height: 110px; resize: vertical; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
        .form-group { flex: 1; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.95rem; font-weight: 500; color: var(--text); }
        .basic-info-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .gender-age-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .relations-table { width: 100%; border-collapse: collapse; margin-top: 8px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
        .relations-table th { text-align: left; padding: 12px 16px; background: var(--primary-light); color: var(--primary-dark); font-weight: 600; font-size: 0.95rem; }
        .relations-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); background: #fff; }
        .relations-table select, .relations-table input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; }
        .delete-relation-btn { background: transparent; border: none; color: #e74c3c; cursor: pointer; padding: 6px 10px; border-radius: 6px; }
        
        .hidden { display: none !important; }

        /* ---------- 移动端适配与下拉菜单 ---------- */
        .hidden-pc { display: none; }
        .dropdown { position: relative; }
        .dropdown-menu { position: absolute; top: calc(100% + 8px); right: 0; background: #fff; border-radius: var(--radius-sm); box-shadow: 0 8px 24px rgba(0,0,0,0.15); width: 160px; z-index: 100; overflow: hidden; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease; }
        .dropdown.active .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item { padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.2s; font-size: 0.95rem; }
        .dropdown-item:hover { background: #fcfaf8; }
        .dropdown-item.danger { color: #e74c3c; }

        @media (max-width: 768px) {
            body { padding: 0; }
            .app-container { height: 100vh; }
            .app-header { display: none; }
            .main-grid { display: block; height: 100%; }
            .panel { border-radius: 0; height: 100%; }
            
            #panel-char { display: none; }
            #panel-graph { display: flex; }
            .show-mobile-char #panel-char { display: flex; }
            .show-mobile-char #panel-graph { display: none; }

            .hidden-pc { display: block; }
            .hidden-mobile { display: none !important; }

            .modal-overlay { padding: 10px; }
            .modal { max-height: 95vh; }
            .modal-header, .modal-body, .modal-footer { padding: 16px; }
            .edit-input, .edit-textarea, .edit-select { padding: 8px 12px; }
            
            .category-header { font-size: 0.95rem; padding: 10px 14px; }
            .list-item { padding: 10px 12px; }
            #moveToast { bottom: 20px; }
        }
    </style>
</head>
<body>
    <!-- 取消移动全局按钮 -->
    <div id="moveToast" class="hidden">取消移动</div>

    <div class="app-container">
        <!-- PC顶栏 -->
        <header class="app-header">
            <h1><i class="fas fa-feather-alt"></i> 小说人设·关系簿</h1>
            <div class="header-actions">
                <button class="btn btn-outline btn-sm" id="exportBtn"><i class="fas fa-download"></i> 导出</button>
                <button class="btn btn-outline btn-sm" id="importBtn"><i class="fas fa-upload"></i> 导入</button>
                <input type="file" id="importFileInput" accept=".json" style="display:none" />
                <button class="btn btn-danger btn-sm" id="clearAllBtn"><i class="fas fa-trash-alt"></i> 清空</button>
            </div>
        </header>
        
        <div class="main-grid" id="mainGrid">
            <!-- 角色面板 -->
            <div class="panel" id="panel-char">
                <div class="panel-header">
                    <h2><i class="fas fa-users"></i> 角色</h2>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button class="btn btn-outline btn-sm" id="addCategoryBtn"><i class="fas fa-plus"></i> 分类</button>
                        <button class="btn btn-primary btn-sm" id="showAddCharBtn"><i class="fas fa-plus"></i> 角色</button>
                        
                        <!-- 移动端下拉菜单 -->
                        <div class="dropdown hidden-pc" id="dropdown-char">
                            <button class="btn btn-outline btn-sm dropdown-toggle"><i class="fas fa-bars"></i></button>
                            <div class="dropdown-menu">
                                <div class="dropdown-item switch-panel-btn"><i class="fas fa-project-diagram"></i> 关系图</div>
                                <div class="dropdown-item trigger-export"><i class="fas fa-download"></i> 导出</div>
                                <div class="dropdown-item trigger-import"><i class="fas fa-upload"></i> 导入</div>
                                <div class="dropdown-item danger trigger-clear"><i class="fas fa-trash-alt"></i> 清空</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 搜索框 -->
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索角色姓名、简介或设定..." />
                </div>

                <div class="list-container" id="charListContainer"></div>
            </div>
            
            <!-- 关系图面板 -->
            <div class="panel" id="panel-graph">
                <div class="panel-header">
                    <h2><i class="fas fa-project-diagram"></i> 关系图</h2>
                    <div class="hidden-mobile" style="font-size: 0.85rem; color: var(--text-light);">
                        滚轮缩放 · Ctrl+拖动画布 · 右键/长按节点连线
                    </div>
                    
                    <!-- 移动端下拉菜单 -->
                    <div class="dropdown hidden-pc" id="dropdown-graph">
                        <button class="btn btn-outline btn-sm dropdown-toggle"><i class="fas fa-bars"></i></button>
                        <div class="dropdown-menu">
                            <div class="dropdown-item switch-panel-btn"><i class="fas fa-users"></i> 角色列表</div>
                            <div class="dropdown-item trigger-export"><i class="fas fa-download"></i> 导出</div>
                            <div class="dropdown-item trigger-import"><i class="fas fa-upload"></i> 导入</div>
                            <div class="dropdown-item danger trigger-clear"><i class="fas fa-trash-alt"></i> 清空</div>
                        </div>
                    </div>
                </div>
                <div class="relation-graph-container">
                    <div id="cy"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 角色弹窗 -->
    <div id="characterModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">角色详情</h3>
                <button class="btn btn-outline btn-sm" id="closeModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody">
                <div id="characterDetailView">
                    <div class="detail-section">
                        <h4><i class="fas fa-user"></i> 基本信息</h4>
                        <div class="basic-info-grid">
                            <div class="detail-content" id="detailName" style="font-size: 1.1rem; font-weight: 600;"></div>
                            <div class="gender-age-row">
                                <div class="form-group"><label>性别</label><div class="detail-content" id="detailGender"></div></div>
                                <div class="form-group"><label>年龄</label><div class="detail-content" id="detailAge"></div></div>
                            </div>
                        </div>
                    </div>
                    <div class="detail-section"><h4><i class="fas fa-file-alt"></i> 角色简介</h4><div class="detail-content" id="detailDescription"></div></div>
                    <div class="detail-section">
                        <h4><i class="fas fa-link"></i> 人际关系</h4>
                        <table class="relations-table" id="detailRelationsTable" style="margin-top: 0;">
                            <thead><tr><th style="width:25%">姓名</th><th style="width:25%">关系</th><th style="width:50%">描述</th></tr></thead>
                            <tbody id="detailRelationsBody"></tbody>
                        </table>
                        <div id="noRelationsMsg" class="empty-msg detail-content" style="margin-top: 0;">暂无关系</div>
                    </div>
                    <div class="detail-section"><h4><i class="fas fa-eye"></i> 外貌设定</h4><div class="detail-content" id="detailAppearance"></div></div>
                    <div class="detail-section"><h4><i class="fas fa-brain"></i> 人物设定</h4><div class="detail-content" id="detailPersonality"></div></div>
                    <div class="detail-section"><h4><i class="fas fa-history"></i> 背景设定</h4><div class="detail-content" id="detailBackground"></div></div>
                </div>
                <div id="characterEditView" class="hidden">
                    <div class="detail-section">
                        <h4><i class="fas fa-user"></i> 基本信息</h4>
                        <div class="basic-info-grid">
                            <div class="form-group"><label>姓名 *</label><input type="text" id="editName" class="edit-input" placeholder="输入角色姓名" /></div>
                            <div class="gender-age-row">
                                <div class="form-group"><label>所属分类</label><select id="editCategory" class="edit-select"></select></div>
                                <div class="form-group"><label>性别</label><select id="editGender" class="edit-select"><option value="男">男</option><option value="女">女</option><option value="其它">其它</option></select></div>
                                <div class="form-group"><label>年龄</label><input type="number" id="editAge" class="edit-input" placeholder="如：22" min="0" max="999" /></div>
                            </div>
                        </div>
                    </div>
                    <div class="detail-section"><h4><i class="fas fa-file-alt"></i> 角色简介</h4><textarea id="editDescription" class="edit-textarea" placeholder="简短概括角色的身份与核心特征..."></textarea></div>
                    <div class="detail-section">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
                            <h4 style="margin-bottom: 0;"><i class="fas fa-link"></i> 人际关系</h4>
                            <button type="button" class="btn btn-outline btn-sm" id="addRelationRowBtn"><i class="fas fa-plus"></i> 添加关系</button>
                        </div>
                        <table class="relations-table" style="margin-bottom: 0;">
                            <thead><tr><th style="width:25%">姓名</th><th style="width:25%">关系</th><th style="width:40%">描述</th><th style="width:10%; text-align:center;">操作</th></tr></thead>
                            <tbody id="editRelationsBody"></tbody>
                        </table>
                    </div>
                    <div class="detail-section"><h4><i class="fas fa-eye"></i> 外貌设定</h4><textarea id="editAppearance" class="edit-textarea" placeholder="五官、发型、衣着打扮等..."></textarea></div>
                    <div class="detail-section"><h4><i class="fas fa-brain"></i> 人物设定</h4><textarea id="editPersonality" class="edit-textarea" placeholder="性格特点、优缺点、口头禅等..."></textarea></div>
                    <div class="detail-section"><h4><i class="fas fa-history"></i> 背景设定</h4><textarea id="editBackground" class="edit-textarea" placeholder="身世、成长经历、过往重要事件等..."></textarea></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelEditBtn">取消</button>
                <button class="btn btn-primary" id="saveEditBtn"><i class="fas fa-save"></i> 保存</button>
                <button class="btn" id="editCharBtn"><i class="fas fa-edit"></i> 编辑</button>
                <button class="btn btn-danger" id="deleteCharBtn"><i class="fas fa-trash"></i> 删除</button>
            </div>
        </div>
    </div>

    <!-- 连线编辑弹窗 -->
    <div id="relModal" class="modal-overlay hidden">
        <div class="modal" style="max-width:420px;">
            <div class="modal-header"><h3 id="relModalTitle">编辑关系</h3><button class="btn btn-outline btn-sm close-rel-modal"><i class="fas fa-times"></i></button></div>
            <div class="modal-body">
                <div class="form-group" style="margin-bottom: 20px;"><label>关系</label><input type="text" id="r-type" class="edit-input" placeholder="如：父亲、仇敌" /></div>
                <div class="form-group"><label>描述</label><textarea id="r-desc" class="edit-textarea" placeholder="关系的详细说明"></textarea></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="saveRelBtn">保存</button>
                <button class="btn btn-danger" id="delRelBtn">删除</button>
            </div>
        </div>
    </div>

    <!-- 分类编辑弹窗 -->
    <div id="catModal" class="modal-overlay hidden">
        <div class="modal" style="max-width:420px;">
            <div class="modal-header"><h3 id="catModalTitle">编辑分类</h3><button class="btn btn-outline btn-sm close-cat-modal"><i class="fas fa-times"></i></button></div>
            <div class="modal-body">
                <div class="form-group"><label>分类名称</label><input type="text" id="c-name" class="edit-input" placeholder="输入分类名称" /></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="saveCatBtn">保存</button>
                <button class="btn btn-danger" id="delCatBtn">删除</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'novel_data_v6';
        const DEFAULT_COLOR = '#b76e79';
        let data = { categories: [], characters: [] };
        let cy = null;
        let currentCharacterId = null;
        let isNewCharacter = false;
        
        let drawSourceId = null; 
        let curRelEdit = null; 
        let curCatEditId = null; // 当前编辑的分类ID
        let movingCharId = null; // 全局：当前正在移动的角色

        // ====== 移动端菜单与交互 ======
        document.querySelectorAll('.dropdown-toggle').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const parent = btn.closest('.dropdown');
                document.querySelectorAll('.dropdown').forEach(d => { if(d !== parent) d.classList.remove('active'); });
                parent.classList.toggle('active');
            });
        });
        document.addEventListener('click', () => { document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active')); });
        
        document.querySelectorAll('.switch-panel-btn').forEach(btn => btn.addEventListener('click', () => {
            const grid = document.getElementById('mainGrid'); grid.classList.toggle('show-mobile-char');
            if (cy && !grid.classList.contains('show-mobile-char')) setTimeout(() => cy.resize(), 100);
        }));
        document.querySelectorAll('.trigger-export').forEach(btn => btn.addEventListener('click', () => document.getElementById('exportBtn').click()));
        document.querySelectorAll('.trigger-import').forEach(btn => btn.addEventListener('click', () => document.getElementById('importBtn').click()));
        document.querySelectorAll('.trigger-clear').forEach(btn => btn.addEventListener('click', () => document.getElementById('clearAllBtn').click()));

        // ====== 核心逻辑 ======
        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('novel_data_v5'); 
            if (raw) {
                try { 
                    data = JSON.parse(raw); 
                    if (!data.categories) data.categories = [];
                    data.characters.forEach(c => { if(c.categoryId === undefined) c.categoryId = ""; });
                } catch(e) { data = { categories: [], characters: [] }; }
            } else {
                data = {
                    categories: [{ id: 'cat1', name: '主要角色', color: '#b76e79' }],
                    characters: [
                        { id: 'c1', categoryId: 'cat1', name: '林清瑶', age: '22', gender: '女', description: '温柔坚韧，擅长医术。', relations: [{ id: 'r1', relatedId: 'c2', type: '知己', desc: '生死之交' }] },
                        { id: 'c2', categoryId: 'cat1', name: '顾夜寒', age: '24', gender: '男', description: '冷峻寡言，江湖剑客。', relations: [] }
                    ]
                };
            }
            saveData();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            renderAll();
        }

        function genId(prefix) { return prefix + '_' + Math.random().toString(36).substr(2,6); }
        function charName(id) { const c = data.characters.find(x => x.id === id); return c ? c.name : '未知'; }

        // ====== 角色移动逻辑 ======
        function startMovingMode(charId) {
            movingCharId = charId;
            document.body.classList.add('is-moving');
            document.getElementById('moveToast').classList.remove('hidden');
            document.querySelectorAll('.category-group').forEach(g => g.classList.add('collapsed'));
        }

        function cancelMovingMode() {
            movingCharId = null;
            document.body.classList.remove('is-moving');
            document.getElementById('moveToast').classList.add('hidden');
            renderList(); // 重置状态
        }

        document.getElementById('moveToast').addEventListener('click', cancelMovingMode);
        
        // 搜索框实时筛选
        document.getElementById('searchInput').addEventListener('input', renderList);

        // ====== 分类与列表渲染 ======
        document.getElementById('addCategoryBtn').addEventListener('click', () => {
            const name = prompt('请输入新分类名称：');
            if(name && name.trim()) { data.categories.push({ id: genId('cat'), name: name.trim(), color: DEFAULT_COLOR }); saveData(); }
        });

        function renderAll() {
            renderList();
            renderGraph();
        }

        function renderList() {
            const container = document.getElementById('charListContainer');
            container.innerHTML = '';
            
            const query = document.getElementById('searchInput').value.trim().toLowerCase();

            const renderChar = (c) => {
                const detail = [c.age, c.gender].filter(Boolean).join(' · ');
                return `
                <div class="list-item" data-id="${c.id}">
                    <div class="info">
                        <div class="name">${c.name}${detail ? `<span class="badge">${detail}</span>` : ''}</div>
                        <div class="detail">${c.description || '暂无简介'}</div>
                    </div>
                </div>`;
            };

            // 渲染所有分类
            data.categories.forEach(cat => {
                let chars = data.characters.filter(c => c.categoryId === cat.id);
                
                // 根据输入框过滤角色
                if (query) {
                    chars = chars.filter(c => {
                        const str = `${c.name} ${c.description || ''} ${c.appearance || ''} ${c.personality || ''} ${c.background || ''}`.toLowerCase();
                        return str.includes(query);
                    });
                    // 如果在搜索状态下且该分类过滤后没有匹配的角色，则不显示该分类
                    if (chars.length === 0) return;
                }

                const catColor = cat.color || DEFAULT_COLOR; 
                container.innerHTML += `
                    <div class="category-group" data-cat-id="${cat.id}">
                        <div class="category-header">
                            <span style="display:flex;align-items:center;gap:8px;">
                                <i class="fas fa-chevron-down"></i> ${cat.name} (${chars.length})
                            </span> 
                            <input type="color" class="cat-color-picker" data-cat-id="${cat.id}" value="${catColor}" title="更改分类颜色" />
                        </div>
                        <div class="category-content data-target-cat="${cat.id}">
                            ${chars.length ? chars.map(renderChar).join('') : '<div class="empty-msg">空分类</div>'}
                        </div>
                    </div>`;
            });

            // 未分类组
            let uncatChars = data.characters.filter(c => !c.categoryId);
            if (query) {
                uncatChars = uncatChars.filter(c => {
                    const str = `${c.name} ${c.description || ''} ${c.appearance || ''} ${c.personality || ''} ${c.background || ''}`.toLowerCase();
                    return str.includes(query);
                });
            }
            
            // 未分类如果有且匹配（或者不在搜索状态），则显示
            if (!(query && uncatChars.length === 0)) {
                container.innerHTML += `
                    <div class="category-group" data-cat-id="">
                        <div class="category-header"><span style="display:flex;align-items:center;gap:8px;"><i class="fas fa-chevron-down"></i> 未分类 (${uncatChars.length})</span> </div>
                        <div class="category-content data-target-cat="">
                            ${uncatChars.length ? uncatChars.map(renderChar).join('') : '<div class="empty-msg">暂无未分类角色</div>'}
                        </div>
                    </div>`;
            }

            // 分类头长按与点击事件
            container.querySelectorAll('.category-header').forEach(header => {
                const catId = header.parentElement.getAttribute('data-cat-id');
                let pressTimer = null;
                let longPressTriggered = false;
                let startY = 0;

                const startPress = (e) => {
                    // 正在移动角色 或 点击的是“未分类”时不触发分类的编辑长按
                    if (movingCharId || !catId) return; 
                    longPressTriggered = false;
                    startY = e.touches ? e.touches[0].clientY : e.clientY;
                    pressTimer = setTimeout(() => {
                        longPressTriggered = true;
                        if (navigator.vibrate) navigator.vibrate(50);
                        openCatModal(catId);
                    }, 500);
                };

                const cancelPress = () => { if(pressTimer) clearTimeout(pressTimer); };
                const movePress = (e) => {
                    if(pressTimer) {
                        const currentY = e.touches ? e.touches[0].clientY : e.clientY;
                        if(Math.abs(currentY - startY) > 10) clearTimeout(pressTimer);
                    }
                };

                header.addEventListener('mousedown', startPress);
                header.addEventListener('touchstart', startPress, {passive: true});
                header.addEventListener('mouseup', cancelPress);
                header.addEventListener('mouseleave', cancelPress);
                header.addEventListener('touchend', cancelPress);
                header.addEventListener('touchcancel', cancelPress);
                header.addEventListener('mousemove', movePress);
                header.addEventListener('touchmove', movePress, {passive: true});

                header.addEventListener('click', (e) => {
                    // 如果刚触发了长按，则阻止默认折叠
                    if (longPressTriggered) {
                        e.stopPropagation();
                        setTimeout(() => longPressTriggered = false, 0);
                        return;
                    }

                    if (movingCharId) {
                        e.stopPropagation();
                        const targetCat = catId;
                        const char = data.characters.find(c => c.id === movingCharId);
                        if(char && char.categoryId !== targetCat) { char.categoryId = targetCat; saveData(); }
                        cancelMovingMode();
                    } else {
                        header.parentElement.classList.toggle('collapsed');
                    }
                });
            });

            container.querySelectorAll('.cat-color-picker').forEach(picker => {
                picker.addEventListener('click', e => e.stopPropagation());
                picker.addEventListener('change', e => {
                    const catId = e.target.dataset.catId; const cat = data.categories.find(c => c.id === catId);
                    if (cat) { cat.color = e.target.value; saveData(); }
                });
            });

            // 角色列表统一长按与点击事件
            container.querySelectorAll('.list-item').forEach(item => {
                const charId = item.dataset.id;
                let pressTimer = null;
                let longPressTriggered = false;
                let startY = 0;

                const startPress = (e) => {
                    if (movingCharId) return;
                    longPressTriggered = false;
                    startY = e.touches ? e.touches[0].clientY : e.clientY;
                    pressTimer = setTimeout(() => {
                        longPressTriggered = true;
                        if (navigator.vibrate) navigator.vibrate(50);
                        startMovingMode(charId);
                    }, 500); // 500ms 长按触发
                };

                const cancelPress = () => { if(pressTimer) clearTimeout(pressTimer); };

                const movePress = (e) => {
                    if(pressTimer) {
                        const currentY = e.touches ? e.touches[0].clientY : e.clientY;
                        if(Math.abs(currentY - startY) > 10) clearTimeout(pressTimer);
                    }
                };

                item.addEventListener('mousedown', startPress);
                item.addEventListener('touchstart', startPress, {passive: true});

                item.addEventListener('mouseup', cancelPress);
                item.addEventListener('mouseleave', cancelPress);
                item.addEventListener('touchend', cancelPress);
                item.addEventListener('touchcancel', cancelPress);

                item.addEventListener('mousemove', movePress);
                item.addEventListener('touchmove', movePress, {passive: true});

                item.addEventListener('click', (e) => {
                    if (movingCharId || longPressTriggered) {
                        e.stopPropagation();
                        setTimeout(() => longPressTriggered = false, 0);
                        return; 
                    }
                    showCharacterDetail(charId);
                });
            });
            
            if(movingCharId) cancelMovingMode();
        }

        // ====== 分类编辑弹窗逻辑 ======
        function openCatModal(catId) {
            const cat = data.categories.find(c => c.id === catId);
            if (!cat) return;
            curCatEditId = catId;
            document.getElementById('c-name').value = cat.name;
            document.getElementById('catModal').classList.remove('hidden');
        }

        document.getElementById('saveCatBtn').addEventListener('click', () => {
            const name = document.getElementById('c-name').value.trim();
            if (!name) return alert('分类名称不能为空');
            const cat = data.categories.find(c => c.id === curCatEditId);
            if (cat) { cat.name = name; saveData(); }
            document.getElementById('catModal').classList.add('hidden');
        });

        document.getElementById('delCatBtn').addEventListener('click', () => {
            if (confirm('确定删除此分类吗？分类中的角色将被移至“未分类”。')) {
                // 将该分类下的角色移入未分类
                data.characters.forEach(c => {
                    if (c.categoryId === curCatEditId) c.categoryId = "";
                });
                // 删除分类
                data.categories = data.categories.filter(c => c.id !== curCatEditId);
                saveData(); 
                document.getElementById('catModal').classList.add('hidden');
            }
        });

        document.querySelector('.close-cat-modal').addEventListener('click', () => document.getElementById('catModal').classList.add('hidden'));

        // ====== 图谱渲染 ======
        function renderGraph() {
            if (cy) { cy.destroy(); cy = null; }
            const elements = [];
            data.characters.forEach((c, i) => {
                const pos = c.position || { x: Math.cos(i*2*Math.PI/Math.max(data.characters.length,1))*200, y: Math.sin(i*2*Math.PI/Math.max(data.characters.length,1))*200 };
                let nodeBgColor = DEFAULT_COLOR;
                if (c.categoryId) { const cat = data.categories.find(x => x.id === c.categoryId); if (cat && cat.color) nodeBgColor = cat.color; }
                elements.push({ data: { id: c.id, label: c.name, bgColor: nodeBgColor }, position: pos });
                
                c.relations.forEach(r => {
                    if (data.characters.find(x => x.id === r.relatedId)) {
                        elements.push({ data: { id: r.id, source: r.relatedId, target: c.id, label: r.type, desc: r.desc, targetColor: nodeBgColor } });
                    }
                });
            });

            cy = cytoscape({
                container: document.getElementById('cy'), elements: elements,
                minZoom: 0.2, maxZoom: 2, wheelSensitivity: 0.4, 
                style: [
                    { selector: 'node', style: { 'background-color': 'data(bgColor)', 'label': 'data(label)', 'color': '#fff', 'text-valign': 'center', 'font-size': '14px', 'width': '70px', 'height': '70px', 'text-wrap': 'wrap', 'text-max-width': '60px' }},
                    { selector: 'node.drawing', style: { 'border-color': '#e74c3c', 'border-width': '4px' }},
                    { selector: 'edge', style: { 'width': 2, 'line-color': 'data(targetColor)', 'target-arrow-color': 'data(targetColor)', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'source-label': 'data(label)', 'source-text-offset': 45, 'font-size': '12px', 'color': '#2e2a28', 'text-background-color': '#fff', 'text-background-opacity': 0.9, 'text-background-padding': '2px' }}
                ], layout: { name: 'preset' }
            });

            cy.on('wheel', function(evt) {
                evt.preventDefault();
                const zoom = cy.zoom(); const wheel = evt.originalEvent.deltaY; const newZoom = zoom * (1 - wheel * 0.001);
                cy.zoom({ level: Math.max(0.2, Math.min(2, newZoom)), renderedPosition: { x: evt.renderedPosition.x, y: evt.renderedPosition.y } });
            });

            cy.on('dragfree', 'node', function(evt) {
                const char = data.characters.find(c => c.id === evt.target.id());
                if (char) { char.position = evt.target.position(); localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
            });

            function handleNodeConnect(targetNode) {
                const nodeId = targetNode.id();
                if (!drawSourceId) { drawSourceId = nodeId; targetNode.addClass('drawing'); } 
                else { if (drawSourceId !== nodeId) openNewRel(drawSourceId, nodeId); clearDrawMode(); }
            }
            cy.on('cxttap', 'node', e => handleNodeConnect(e.target));
            cy.on('taphold', 'node', e => handleNodeConnect(e.target));

            cy.on('tap', 'node', function(e) {
                const tappedId = e.target.id();
                if (drawSourceId) {
                    if (drawSourceId !== tappedId) { openNewRel(drawSourceId, tappedId); clearDrawMode(); }
                } else { showCharacterDetail(tappedId); }
            });

            cy.on('tap', 'edge', function(e) { if (!drawSourceId) openRel(e.target.data('target'), e.target.id()); });
            cy.on('tap', function(e) { if (e.target === cy) clearDrawMode(); });
        }

        function clearDrawMode() { if (drawSourceId && cy) cy.getElementById(drawSourceId).removeClass('drawing'); drawSourceId = null; }

        let isDragging = false, startPos = {x:0, y:0};
        document.getElementById('cy').addEventListener('mousedown', function(evt) {
            if (evt.ctrlKey && evt.button === 0) { isDragging = true; startPos = { x: evt.clientX, y: evt.clientY }; this.style.cursor = 'grabbing'; evt.preventDefault(); }
        });
        document.addEventListener('mousemove', function(evt) {
            if (isDragging && cy) { cy.panBy({ x: evt.clientX - startPos.x, y: evt.clientY - startPos.y }); startPos = { x: evt.clientX, y: evt.clientY }; }
        });
        document.addEventListener('mouseup', function() { if (isDragging) { isDragging = false; document.getElementById('cy').style.cursor = ''; } });
        document.getElementById('cy').addEventListener('contextmenu', e => e.preventDefault());

        // ====== 角色详情与编辑 ======
        function updateCategorySelect(selectedId = '') {
            const sel = document.getElementById('editCategory');
            sel.innerHTML = `<option value="">未分类</option>` + data.categories.map(c => `<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.name}</option>`).join('');
        }

        function showCharacterDetail(id) {
            const char = data.characters.find(c => c.id === id); if (!char) return;
            currentCharacterId = id; isNewCharacter = false;
            
            document.getElementById('detailName').textContent = char.name;
            document.getElementById('detailGender').textContent = char.gender || '未设置';
            document.getElementById('detailAge').textContent = char.age ? char.age + '岁' : '未设置';
            ['Description','Appearance','Personality','Background'].forEach(field => {
                const el = document.getElementById('detail' + field);
                const val = char[field.toLowerCase()] || '';
                el.textContent = val || '暂无内容'; el.classList.toggle('empty', !val);
            });

            const tbody = document.getElementById('detailRelationsBody');
            const noMsg = document.getElementById('noRelationsMsg');
            const table = document.getElementById('detailRelationsTable');
            if (!char.relations || char.relations.length === 0) {
                tbody.innerHTML = ''; noMsg.classList.remove('hidden'); table.classList.add('hidden');
            } else {
                noMsg.classList.add('hidden'); table.classList.remove('hidden');
                tbody.innerHTML = char.relations.map(rel => `<tr data-id="${rel.relatedId}"><td>${charName(rel.relatedId)}</td><td>${rel.type}</td><td>${rel.desc || '-'}</td></tr>`).join('');
                tbody.querySelectorAll('tr').forEach(row => row.addEventListener('click', () => showCharacterDetail(row.dataset.id)));
            }

            document.getElementById('characterDetailView').classList.remove('hidden'); document.getElementById('characterEditView').classList.add('hidden');
            document.getElementById('editCharBtn').classList.remove('hidden'); document.getElementById('deleteCharBtn').classList.remove('hidden');
            document.getElementById('saveEditBtn').classList.add('hidden'); document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('modalTitle').textContent = `角色详情 - ${char.name}`;
            document.getElementById('characterModal').classList.remove('hidden');
            document.getElementById('modalBody').scrollTop = 0;
        }

        document.getElementById('editCharBtn').addEventListener('click', () => {
            const char = data.characters.find(c => c.id === currentCharacterId);
            document.getElementById('editName').value = char.name || '';
            updateCategorySelect(char.categoryId);
            document.getElementById('editGender').value = char.gender || '男';
            document.getElementById('editAge').value = char.age || '';
            document.getElementById('editDescription').value = char.description || '';
            document.getElementById('editAppearance').value = char.appearance || '';
            document.getElementById('editPersonality').value = char.personality || '';
            document.getElementById('editBackground').value = char.background || '';
            
            const tbody = document.getElementById('editRelationsBody');
            tbody.innerHTML = ''; (char.relations || []).forEach(r => addEditRelRow(r.relatedId, r.type, r.desc));

            document.getElementById('characterDetailView').classList.add('hidden'); document.getElementById('characterEditView').classList.remove('hidden');
            document.getElementById('editCharBtn').classList.add('hidden'); document.getElementById('deleteCharBtn').classList.add('hidden');
            document.getElementById('saveEditBtn').classList.remove('hidden'); document.getElementById('cancelEditBtn').classList.remove('hidden');
        });

        document.getElementById('showAddCharBtn').addEventListener('click', () => {
            currentCharacterId = genId('c'); isNewCharacter = true;
            document.getElementById('modalTitle').textContent = '新增角色';
            document.querySelectorAll('.edit-input, .edit-textarea').forEach(el => el.value = '');
            updateCategorySelect(); document.getElementById('editGender').value = '男'; document.getElementById('editRelationsBody').innerHTML = '';
            
            document.getElementById('characterDetailView').classList.add('hidden'); document.getElementById('characterEditView').classList.remove('hidden');
            document.getElementById('editCharBtn').classList.add('hidden'); document.getElementById('deleteCharBtn').classList.add('hidden');
            document.getElementById('saveEditBtn').classList.remove('hidden'); document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('characterModal').classList.remove('hidden'); document.getElementById('modalBody').scrollTop = 0;
        });

        function addEditRelRow(relatedId = '', type = '', desc = '') {
            const exists = Array.from(document.querySelectorAll('.relation-to')).map(el => el.value);
            const opts = data.characters.filter(c => c.id !== currentCharacterId && (c.id === relatedId || !exists.includes(c.id)))
                .map(c => `<option value="${c.id}" ${c.id===relatedId?'selected':''}>${c.name}</option>`).join('');
            if (!opts) return alert('没有可添加的关联角色了');

            const tr = document.createElement('tr');
            tr.innerHTML = `<td><select class="edit-select relation-to" style="padding:8px;">${opts}</select></td>
                <td><input type="text" class="edit-input relation-type" value="${type}" placeholder="如: 父亲" style="padding:8px;"/></td>
                <td><input type="text" class="edit-input relation-desc" value="${desc}" placeholder="描述" style="padding:8px;"/></td>
                <td style="text-align:center;"><button type="button" class="delete-relation-btn del-rel-row"><i class="fas fa-times"></i></button></td>`;
            document.getElementById('editRelationsBody').appendChild(tr);
            tr.querySelector('.del-rel-row').addEventListener('click', () => tr.remove());
        }

        document.getElementById('addRelationRowBtn').addEventListener('click', () => addEditRelRow());

        document.getElementById('saveEditBtn').addEventListener('click', () => {
            const name = document.getElementById('editName').value.trim();
            if (!name) return alert('姓名不能为空');
            
            const char = isNewCharacter ? { id: currentCharacterId, position: null } : data.characters.find(c => c.id === currentCharacterId);
            char.name = name; char.categoryId = document.getElementById('editCategory').value;
            char.gender = document.getElementById('editGender').value; char.age = document.getElementById('editAge').value;
            char.description = document.getElementById('editDescription').value.trim(); char.appearance = document.getElementById('editAppearance').value.trim();
            char.personality = document.getElementById('editPersonality').value.trim(); char.background = document.getElementById('editBackground').value.trim();
            
            const newRels = [];
            document.querySelectorAll('#editRelationsBody tr').forEach(tr => {
                const toId = tr.querySelector('.relation-to').value; const type = tr.querySelector('.relation-type').value.trim(); const desc = tr.querySelector('.relation-desc').value.trim();
                if (toId && type) newRels.push({ id: genId('r'), relatedId: toId, type, desc });
            });
            char.relations = newRels;

            if (isNewCharacter) data.characters.push(char);
            saveData(); document.getElementById('characterModal').classList.add('hidden');
        });

        document.getElementById('cancelEditBtn').addEventListener('click', () => {
            if (isNewCharacter) document.getElementById('characterModal').classList.add('hidden'); else showCharacterDetail(currentCharacterId);
        });

        document.getElementById('deleteCharBtn').addEventListener('click', () => {
            if (confirm('确定删除此角色？')) {
                data.characters = data.characters.filter(c => c.id !== currentCharacterId);
                data.characters.forEach(c => { c.relations = (c.relations||[]).filter(r => r.relatedId !== currentCharacterId); });
                saveData(); document.getElementById('characterModal').classList.add('hidden');
            }
        });

        // ====== 连线逻辑 ======
        function openNewRel(fromId, toId) {
            const A = data.characters.find(c => c.id === toId);
            if (A.relations && A.relations.some(r => r.relatedId === fromId)) return alert('关系已存在，请点击连线进行修改');
            curRelEdit = { isNew: true, charId: toId, relatedId: fromId };
            document.getElementById('relModalTitle').textContent = `建立关系: ${charName(fromId)} -> ${charName(toId)}`;
            document.getElementById('r-type').value = ''; document.getElementById('r-desc').value = '';
            document.getElementById('delRelBtn').classList.add('hidden'); document.getElementById('relModal').classList.remove('hidden');
        }

        function openRel(charId, relId) {
            const A = data.characters.find(c => c.id === charId); const r = A.relations.find(x => x.id === relId);
            if (!r) return;
            curRelEdit = { isNew: false, charId, relId };
            document.getElementById('relModalTitle').textContent = `修改关系: ${charName(r.relatedId)} -> ${charName(charId)}`;
            document.getElementById('r-type').value = r.type; document.getElementById('r-desc').value = r.desc;
            document.getElementById('delRelBtn').classList.remove('hidden'); document.getElementById('relModal').classList.remove('hidden');
        }

        document.getElementById('saveRelBtn').addEventListener('click', () => {
            const type = document.getElementById('r-type').value.trim(); const desc = document.getElementById('r-desc').value.trim();
            if (!type) return alert('类型不能为空');
            const A = data.characters.find(c => c.id === curRelEdit.charId);
            if (curRelEdit.isNew) A.relations.push({ id: genId('r'), relatedId: curRelEdit.relatedId, type, desc });
            else { const r = A.relations.find(x => x.id === curRelEdit.relId); r.type = type; r.desc = desc; }
            saveData(); document.getElementById('relModal').classList.add('hidden');
        });

        document.getElementById('delRelBtn').addEventListener('click', () => {
            const A = data.characters.find(c => c.id === curRelEdit.charId);
            A.relations = A.relations.filter(x => x.id !== curRelEdit.relId);
            saveData(); document.getElementById('relModal').classList.add('hidden');
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('characterModal').classList.add('hidden'));
        document.querySelector('.close-rel-modal').addEventListener('click', () => document.getElementById('relModal').classList.add('hidden'));
        
        // ====== 全局功能 ======
        document.getElementById('exportBtn').addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)]));
            a.download = `人设数据_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        });
        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFileInput').click());
        document.getElementById('importFileInput').addEventListener('change', function(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = ev => { 
                try { 
                    const imported = JSON.parse(ev.target.result); 
                    if(!imported.categories) imported.categories = [];
                    if(imported.characters) imported.characters.forEach(c => { if(c.categoryId === undefined) c.categoryId = ""; });
                    data = imported; saveData(); alert('导入成功'); 
                } catch(err) { alert('文件错误'); } 
            };
            r.readAsText(f); this.value = '';
        });
        document.getElementById('clearAllBtn').addEventListener('click', () => {
            if (confirm('清空所有数据？不可恢复！')) { data = { categories: [], characters: [] }; saveData(); }
        });

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
